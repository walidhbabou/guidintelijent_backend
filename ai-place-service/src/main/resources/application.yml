server:
  port: 8082

spring:
  application:
    name: ai-place-service
  datasource:
    url: jdbc:h2:mem:aiplace_db
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

jwt:
  secret: ${JWT_SECRET:j9DJrShbo8zent0ckOlpw5vayQMIdH3ZEiX4NLVB1CPK7AxqYfgmGU6uFRTsW2}
  accessTokenExpirationMs: 3600000
  refreshTokenExpirationMs: 86400000

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000

morocco-ai-guide:
  base-url: https://llm-ai-guid.onrender.com

