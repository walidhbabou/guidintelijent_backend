server:
  port: 8083

spring:
  application:
    name: core-service

  datasource:
    url: jdbc:h2:mem:tourdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

jwt:
  secret: ${JWT_SECRET:j9DJrShbo8zent0ckOlpw5vayQMIdH3ZEiX4NLVB1CPK7AxqYfgmGU6uFRTsW2}
  accessTokenExpirationMs: 3600000
  refreshTokenExpirationMs: 86400000

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000
