name: Backend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api_gateway
          - discovery-service
          - ai-place-service
          - authentification
          - core-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build, test and compile check
        working-directory: ${{ matrix.service }}
        run: ./mvnw --batch-mode --no-transfer-progress clean test compile
